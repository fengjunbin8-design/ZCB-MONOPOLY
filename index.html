<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZCB MONOPOLY | 零碳天地大富翁 (10x10)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        /* =================基础重置与变量================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #7b5b3e; /* MC 泥土色 */
            --board-bg: #407b22; /* MC 草地色 */
            --tile-bg: #b0b0b0;
            --text-dark: #000000;
            --font-pixel: 'Press Start 2P', monospace;
            --font-pixel-narrow: 'VT323', monospace;
            --font-sans: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            --board-size: min(92vh, calc(100vw - 420px)); /* 桌面端完美自适应 */
        }
        
        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(45deg, rgba(0,0,0,0.1) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.1) 75%, rgba(0,0,0,0.1)),
                linear-gradient(45deg, rgba(0,0,0,0.1) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.1) 75%, rgba(0,0,0,0.1));
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-dark);
            user-select: none;
        }

        #game-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }

        /* =================左侧信息栏================= */
        #left-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: var(--board-size);
        }

        .title-box {
            background: #e0e0e0;
            border: 4px solid #000;
            padding: 15px;
            text-align: center;
        }
        .title-box h1 {
            font-family: var(--font-pixel);
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        /* 语言切换按钮 */
        #lang-btn {
            background: #ffeb3b;
            border: 3px solid #000;
            padding: 8px;
            font-family: var(--font-sans);
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-align: center;
            font-size: 14px;
            box-shadow: 3px 3px 0 #000;
        }
        #lang-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

        .player-card {
            background: #b0b0b0;
            border: 4px solid #000;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 74px; 
        }
        .player-info { display: flex; flex-direction: column; gap: 5px; }
        .p-name { font-family: var(--font-sans); font-size: 18px; font-weight: bold; }
        .p-target { font-size: 12px; color: #444; font-family: var(--font-sans); }
        .p-money { font-family: var(--font-pixel); font-size: 18px; color: #ffea00; text-shadow: 1px 1px 0 #000; }

        .log-box {
            background: #2b2b2b;
            border: 4px solid #000;
            flex-grow: 1;
            padding: 10px;
            color: #ccc;
            font-size: 13px;
            overflow-y: auto;
            font-family: var(--font-sans);
            line-height: 1.5;
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px dashed #444; padding-bottom: 5px; }

        /* =================棋盘区域 10x10================= */
        #board-wrapper {
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
            background: var(--board-bg);
            border: 6px solid #5a8f29;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* 调整为10列 */
            grid-template-rows: repeat(10, 1fr);    /* 调整为10行 */
            gap: 2px;
            padding: 4px;
        }

        .tile {
            background: var(--tile-bg);
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            position: relative;
            padding: 2px;
            padding-bottom: 6px;
            text-align: center;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.5);
        }
        
        .tile.corner { justify-content: center; } 

        .emoji-icon { font-size: calc(var(--board-size) * 0.03); margin-bottom: 2px; } /* 图标变大 */
        
        .tile-name {
            font-family: var(--font-sans);
            font-size: calc(var(--board-size) * 0.014); /* 字体变大 */
            font-weight: bold;
            line-height: 1.15;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            width: 100%;
            color: #000;
            text-shadow: none; /* 彻底去除多余阴影，保持清爽 */
        }
        .tile-price {
            font-family: var(--font-pixel-narrow);
            font-size: calc(var(--board-size) * 0.016);
            color: #222;
            margin-top: 2px;
            text-shadow: none;
        }

        /* 棋子设计 */
        .tokens-container {
            position: absolute;
            top: 2px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 2px;
            flex-wrap: wrap;
            z-index: 10;
        }
        .token {
            width: calc(var(--board-size) * 0.018);
            height: calc(var(--board-size) * 0.018);
            border: 1px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-pixel);
            font-size: calc(var(--board-size) * 0.01);
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* =================棋盘中心交互区================= */
        .board-center {
            grid-column: 2 / 10; /* 适应 10x10 网格 */
            grid-row: 2 / 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: calc(var(--board-size) * 0.04);
            padding: 20px;
        }

        /* 排行榜 */
        .leaderboard {
            background: rgba(0, 0, 0, 0.65);
            border: 2px solid #fff;
            padding: 10px;
            width: 95%;
            text-align: center;
            color: #fff;
            border-radius: 5px;
        }
        .lb-title { font-family: var(--font-sans); font-size: 13px; margin-bottom: 5px; color: #ccc;}
        .lb-stats { display: flex; justify-content: center; gap: 20px; font-family: var(--font-pixel); font-size: 18px; margin-bottom: 8px;}
        .lb-badges {
            display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;
            max-height: 60px; overflow-y: auto;
        }
        .badge {
            font-family: var(--font-sans); font-size: 11px; padding: 3px 6px;
            background: #222; border-left: 3px solid; white-space: nowrap;
        }

        .center-title { text-align: center; color: #fff; font-family: var(--font-pixel); text-shadow: 2px 2px 0 #000; }
        .center-title h2 { font-size: calc(var(--board-size) * 0.045); margin-bottom: 8px; }
        .center-title p { font-family: var(--font-sans); font-size: calc(var(--board-size) * 0.02); margin-bottom: 5px;}
        .center-title .sub { font-size: calc(var(--board-size) * 0.015); color: #ffff00; }

        /* 摇骰子按钮块 */
        .roll-block {
            display: flex;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            cursor: pointer;
            transition: transform 0.1s;
            width: calc(var(--board-size) * 0.35);
            height: calc(var(--board-size) * 0.07);
        }
        .roll-block:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
        .roll-icon {
            background: #d3d3d3;
            width: 30%;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-pixel); font-size: 24px; color: #fff;
            text-shadow: 2px 2px 0 #000; border-right: 4px solid #000;
        }
        .roll-btn-inner {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-sans); font-size: calc(var(--board-size) * 0.022);
            font-weight: bold; color: #fff; text-shadow: 1px 1px 0 #000;
        }

        /* 实体卡牌堆 */
        .cards-deck {
            display: flex; gap: calc(var(--board-size) * 0.015);
            justify-content: center; align-items: center; margin-top: 5px;
        }
        .chance-card {
            width: calc(var(--board-size) * 0.065);
            height: calc(var(--board-size) * 0.095);
            background: #3a3a3a;
            border: 2px solid #111;
            border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-pixel); font-size: calc(var(--board-size) * 0.03); color: #222;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.8);
            transition: all 0.3s ease;
            position: relative;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.1) 5px, rgba(0,0,0,0.1) 10px);
        }
        .chance-card.active {
            cursor: pointer; color: #fff; background: #673ab7; border-color: #fff;
            animation: float 1.5s ease-in-out infinite, pulseGlow 1.5s infinite;
        }
        .chance-card.active:hover { transform: translateY(-10px) scale(1.1); z-index: 2; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px #b388ff; } 50% { box-shadow: 0 0 20px #b388ff; } 100% { box-shadow: 0 0 5px #b388ff; } }

        /* =================弹窗系统================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #e0e0e0; border: 4px solid #000; padding: 25px;
            text-align: center; max-width: 500px; width: 90%;
            box-shadow: 8px 8px 0 #000; font-family: var(--font-sans);
        }
        .modal-content h3 { margin-bottom: 15px; font-size: 24px; font-weight: bold;}
        .modal-btn {
            background: #4caf50; border: 3px solid #000; padding: 12px 20px;
            color: #fff; font-family: var(--font-sans); font-size: 16px; font-weight: bold;
            cursor: pointer; margin: 5px; box-shadow: 3px 3px 0 #000; width: 100%;
        }
        .modal-btn:hover { background: #45a049; }
        .token-choice-btn {
            background: #888; color: #fff; display: flex; flex-direction: column;
            align-items: center; gap: 5px; margin-bottom: 10px;
        }
        .token-choice-btn:hover { background: #666; }
        .expected-dest { color: #ffeb3b; font-size: 14px; }
        
        .quiz-opt { text-align: left; background: #fff; color: #000; }
        .quiz-opt:hover { background: #ddd; }
        .quiz-feedback { margin-top: 15px; padding: 15px; background: #dff0d8; color: #3c763d; border: 2px solid #3c763d; font-weight: bold; display: none; }

    </style>
</head>
<body>

<div id="game-container">
    <div id="left-panel">
        <button id="lang-btn" onclick="toggleLanguage()">🌐 EN / 繁中</button>
        <div class="title-box">
            <h1>ZCB MONOPOLY</h1>
        </div>
        <div id="players-container"></div>
        <div class="log-box" id="sys-log">
            <div class="log-entry">> 系統已就緒，歡迎來到零碳天地大富翁。</div>
        </div>
    </div>

    <div id="board-wrapper">
        <div class="board-center">
            
            <div class="leaderboard">
                <div class="lb-title" id="lb-title">地塊佔領統計 / Territory Owned</div>
                <div class="lb-stats" id="lb-stats"></div>
                <div class="lb-badges" id="lb-badges"></div>
            </div>

            <div class="center-title">
                <h2>ZCB PARK</h2>
                <p id="center-subtitle">生態修復 (Ecological Restoration)</p>
                <div class="sub">> 10x10 Grid | Dual Token Mode</div>
            </div>

            <div class="roll-block" id="btn-roll" onclick="rollDice()">
                <div class="roll-icon">?</div>
                <div class="roll-btn-inner" id="roll-btn-text" style="background-color: #ff6a00;">[CIC] 搖骰子</div>
            </div>

            <div class="cards-deck">
                <div class="chance-card" onclick="drawChanceCard(this)">?</div>
                <div class="chance-card" onclick="drawChanceCard(this)">?</div>
                <div class="chance-card" onclick="drawChanceCard(this)">?</div>
                <div class="chance-card" onclick="drawChanceCard(this)">?</div>
                <div class="chance-card" onclick="drawChanceCard(this)">?</div>
            </div>

        </div>
    </div>
</div>

<div class="modal-overlay" id="generic-modal">
    <div class="modal-content">
        <h3 id="gm-title">提示</h3>
        <p id="gm-desc"></p>
        <div id="gm-extra"></div>
        <button class="modal-btn" onclick="closeGenericModal()" id="gm-btn">確認</button>
    </div>
</div>

<script>
    // ================= 语言配置 =================
    let currentLang = 'zh'; 
    const i18n = {
        zh: {
            title: "生態修復 (Ecological Restoration)",
            roll: "搖骰子",
            logStart: "> 系統：MC 地圖已生成 (10x10, 共36格)，歡迎來到零碳天地。",
            btnConfirm: "確認",
            btnTeleport: "立刻傳送",
            lbTitle: "地塊佔領統計",
            roles: {
                CIC: { name: "建造業議會", target: "目標: 偏好技術設施" },
                NGO: { name: "生態組織", target: "目標: 偏好原生林/濕地" },
                PUB: { name: "公眾群體", target: "目標: 偏好教育/廣場" }
            },
            modal: {
                actionTitle: "行動策略選擇",

                chanceTitle: "機會卡 (CHANCE)",
                quizTitle: "生態問答 (QUIZ)",
                buyTitle: "投資建設",
                buyDesc: "這是一片可建設空地，是否要投資？",
                btnBuy: "投資建設",
                btnSkip: "結束回合",
                rentTitle: "支付參觀費",
                freeTitle: "自由選擇 (FREEDOM)",
                freeDesc: "你可以傳送到地圖上的任何一個格子！請選擇目標："
            },
            status: { available: "可建設", builtBy: "已被 {role} 建設" }
        },
        en: {
            title: "Ecological Restoration",
            roll: "ROLL DICE",
            logStart: "> Sys: MC Map Generated (10x10, 36 Tiles). Welcome to ZCB.",
            btnConfirm: "Confirm",
            btnTeleport: "Teleport Now",
            lbTitle: "Territory Owned",
            roles: {
                CIC: { name: "CIC", target: "Target: Tech & Facilities" },
                NGO: { name: "NGO", target: "Target: Forests & Wetlands" },
                PUB: { name: "Public", target: "Target: Education & Squares" }
            },
            modal: {
                actionTitle: "Action Strategy",
                rolled: "You rolled a ",
                pts: "!",
                selectToken: "Select a token block to move:",
                moveToken: "Move Token",
                currentPos: "Current: ",
                expectedPos: "Expected: ",
                chanceTitle: "Chance Card",
                quizTitle: "Eco Quiz",
                buyTitle: "Invest & Build",
                buyDesc: "This is an available plot. Do you want to invest?",
                btnBuy: "Invest",
                btnSkip: "End Turn",
                rentTitle: "Pay Visit Fee",
                freeTitle: "Freedom Choice",
                freeDesc: "You can teleport anywhere! Select your destination:"
            },
            status: { available: "Available", builtBy: "Built by {role}" }
        }
    };

    // ================= 测验题库 (20题) =================
    const quizDB = [
        { en: { q:"Which strategy would you prioritize if visitors trample understory vegetation?", opts:["Add fences to restrict access", "Set clear paths and guide pedestrian flow", "Increase artificial maintenance", "Increase patrol frequency"], ans: 1 }, zh: { q:"游客踩踏导致林下植被受损,你会优先采取哪种策略?", opts:["增加围栏,限制进入", "设置明确步道并引导流线", "增加人工维护与补种", "提高巡逻管理频率"], ans: 1 } },
        { en: { q:"In a constructed wetland system, which strategy best aligns with zero-carbon?", opts:["Continuous groundwater recharge", "Rainwater harvesting + plant filtration", "Regular manual water replacement", "Chemical purification"], ans: 1 }, zh: { q:"在人工湿地系统设计中,哪种策略最符合零碳理念?", opts:["使用地下水持续补水", "雨水收集+植物过滤系统", "定期人工换水", "使用化学净化设备"], ans: 1 } },
        { en: { q:"If your goal is to increase the bird population, what would you prioritize?", opts:["Increase tall tree canopy layer", "Increase hard paving areas", "Increase nighttime lighting", "Increase open lawn areas"], ans: 0 }, zh: { q:"如果你希望增加鸟类数量,你会优先调整哪一项?", opts:["增加高大乔木层", "增加硬质铺装", "增加夜间照明", "增加开放草坪"], ans: 0 } },
        { en: { q:"Why are native species prioritized in ecological restoration?", opts:["Lower construction costs", "Better adaptation to local climate", "Higher aesthetic value", "Faster growth rates"], ans: 1 }, zh: { q:"在生态修复中,为什么优先选择本土植物?", opts:["施工成本更低", "更适应本地气候与生态系统", "更美观", "生长速度更快"], ans: 1 } },
        { en: { q:"Given HK's heavy rain, which design is more rational?", opts:["Large open lawns", "Permeable paving + stormwater retention", "Completely hard-paved", "Drainage pipes without landscape"], ans: 1 }, zh: { q:"面对香港的强降雨环境,哪种设计更合理?", opts:["大面积草坪", "透水铺装+雨水调蓄系统", "全部硬质铺装", "增加排水管但不做景观设计"], ans: 1 } },
        { en: { q:"What is the primary ecological value of gabions?", opts:["Lowest cost", "Structural stability + microhabitats", "Easy to dismantle", "Commercial display"], ans: 1 }, zh: { q:"石笼在生态设计中的价值体现在?", opts:["成本最低", "结构稳定同时提供微生境", "易于拆除", "更适合商业展示"], ans: 1 } },
        { en: { q:"To lower site temperature, what is the most effective strategy?", opts:["Increase shade trees + green coverage", "Add outdoor AC", "Use light-colored paving", "Reduce vegetation"], ans: 0 }, zh: { q:"降低场地温度最有效的策略是?", opts:["增加遮阳乔木+提高绿化覆盖率", "增加空调设备", "使用浅色铺装", "减少植被便于通风"], ans: 0 } },
        { en: { q:"What is the main purpose of routing rainwater into a wetland?", opts:["Store water", "Natural filtration", "Provide recreation", "Enhance visual effects"], ans: 1 }, zh: { q:"雨水流入人工湿地的主要目的是什么?", opts:["储存景观水体", "通过植物和土壤进行自然过滤", "提供娱乐功能", "增加视觉效果"], ans: 1 } },
        { en: { q:"If visitors put pressure on ecology, how to balance?", opts:["Keep fully open", "Limit capacity + educational guidance", "Close off zones", "Add commercial facilities"], ans: 1 }, zh: { q:"如果游客数量对生态造成压力,如何平衡?", opts:["完全开放,不做限制", "限制进入人数+增加教育引导", "完全封闭生态区", "增加商业设施分流人群"], ans: 1 } },
        { en: { q:"Between 'exhibition space' and 'native forest', a balanced choice is:", opts:["Prioritize exhibition", "Prioritize forest", "Optimize space & layouts for both", "Status quo"], ans: 2 }, zh: { q:"在“展览空间”和“原生林”之间做选择,你会?", opts:["优先展览", "优先原生林", "两者结合,压缩建筑并优化布局", "保持现状"], ans: 2 } },
        { en: { q:"Which organisms are critical for nutrient cycling?", opts:["Birds", "Decomposers", "Pollinating insects", "Small mammals"], ans: 1 }, zh: { q:"哪类生物对养分循环最关键?", opts:["鸟类", "分解者", "授粉昆虫", "小型哺乳动物"], ans: 1 } },
        { en: { q:"What is the role of butterflies and bees?", opts:["Control pests", "Promote plant reproduction", "Improve soil", "Regulate populations"], ans: 1 }, zh: { q:"蝴蝶和蜜蜂在生态系统中的主要作用是?", opts:["控制害虫数量", "促进植物繁殖", "改善土壤结构", "调节种群关系"], ans: 1 } },
        { en: { q:"What structure does a healthy urban native forest possess?", opts:["Single tree canopy", "Multi-layered vegetation", "Lawn-dominant", "Artificial-dominant"], ans: 1 }, zh: { q:"健康的城市原生林通常具备哪种结构?", opts:["单一乔木层", "多层植被结构", "草坪为主覆盖", "人工景观主导"], ans: 1 } },
        { en: { q:"Why are frogs used as indicator species?", opts:["Stable population", "Highly sensitive to environment", "Short life cycle", "Widely distributed"], ans: 1 }, zh: { q:"为什么青蛙常作为生态指示物种?", opts:["数量较为稳定", "对环境敏感", "生命周期较短", "分布范围较广"], ans: 1 } },
        { en: { q:"Main mechanism of constructed wetland water purification?", opts:["Evaporation", "Plant and microbial action", "Artificial filtration", "Sunlight reaction"], ans: 1 }, zh: { q:"人工湿地净化水质的主要机制是?", opts:["水体自然蒸发", "植物微生物作用", "人工过滤设备", "阳光照射反应"], ans: 1 } },
        { en: { q:"Main significance of increasing plant species?", opts:["Improves stability", "Enhances aesthetics", "Reduces costs", "Attracts humans"], ans: 0 }, zh: { q:"提高植物种类数量的主要生态意义是?", opts:["提高系统稳定性", "增强景观效果", "降低养护成本", "增加使用人群"], ans: 0 } },
        { en: { q:"Which relationship represents basic food chain logic?", opts:["Plant->Bird->Insect", "Insect->Plant->Bird", "Plant->Insect->Bird", "Bird->Plant->Microbe"], ans: 2 }, zh: { q:"哪一条符合基本食物链逻辑?", opts:["植物->鸟类->昆虫", "昆虫->植物->鸟类", "植物->昆虫->鸟类", "鸟类->植物->微生物"], ans: 2 } },
        { en: { q:"Primary way vegetation lowers urban temps?", opts:["Reflecting radiation", "Transpiration", "Air circulation", "Decreasing humidity"], ans: 1 }, zh: { q:"植被降低城市温度的主要方式是?", opts:["反射太阳辐射", "蒸腾作用降温", "提高空气流动", "减少地表湿度"], ans: 1 } },
        { en: { q:"Core philosophy of 'low-intervention management'?", opts:["Reduce costs", "Promote natural succession", "Control visitors", "Improve efficiency"], ans: 1 }, zh: { q:"“低干预管理”的核心理念是?", opts:["降低维护成本", "促进自然演替", "控制游客数量", "提高管理效率"], ans: 1 } },
        { en: { q:"Main reason for controlling invasive species?", opts:["Slow growth", "Disrupts ecological balance", "Poor aesthetics", "Difficult to manage"], ans: 1 }, zh: { q:"控制入侵物种的主要原因是?", opts:["生长速度较慢", "破坏生态平衡", "景观效果较差", "管理难度较高"], ans: 1 } }
    ];

    // ================= 棋盘数据 (36格 - 10x10) =================
    // 已根据要求移除 ZCB Lv.3, 室内展区 Lv.3, 绿化墙x1, CHANCEx1
    const tilesData = [
        { id: 0, zh: "起點 GO", en: "START GO", type: "start", price: "+$200", icon: "🏁" },
        { id: 1, zh: "太陽之謎", en: "Solar Mys.", type: "prop", price: 100, role: "PUB", icon: "☀️" },
        { id: 2, zh: "隔離病房", en: "Iso. Ward", type: "prop", price: 100, role: "CIC", icon: "🏥" },
        { id: 3, zh: "石籠牆", en: "Gabion", type: "prop", price: 100, role: "NGO", icon: "🧱" },
        { id: 4, zh: "機會卡", en: "CHANCE", type: "chance", price: "CHANCE", icon: "❓" },
        { id: 5, zh: "關於鳥類", en: "About Birds", type: "prop", price: 100, role: "PUB", icon: "🦤" },
        { id: 6, zh: "零碳天地 Lv.2", en: "ZCB Lv.2", type: "prop", price: 100, role: "CIC", icon: "🏢" },
        { id: 7, zh: "零碳天地 Lv.1", en: "ZCB Lv.1", type: "prop", price: 100, role: "CIC", icon: "🏢" },
        { id: 8, zh: "綠化牆", en: "Green Wall", type: "prop", price: 100, role: "NGO", icon: "🌿" },
        
        { id: 9, zh: "基金贊助", en: "Funding", type: "corner", price: "+$400", icon: "💰" },
        { id: 10, zh: "生態問答", en: "QUIZ", type: "quiz", price: "QUIZ", icon: "📖" },
        { id: 11, zh: "光電系統", en: "PV System", type: "prop", price: 100, role: "CIC", icon: "⚡" },
        { id: 12, zh: "原生林 Lv.2", en: "Forest Lv.2", type: "prop", price: 100, role: "NGO", icon: "🌲" },
        { id: 13, zh: "原生林 Lv.1", en: "Forest Lv.1", type: "prop", price: 100, role: "NGO", icon: "🌲" },
        { id: 14, zh: "CITAC", en: "CITAC", type: "prop", price: 100, role: "CIC", icon: "💻" },
        { id: 15, zh: "機會卡", en: "CHANCE", type: "chance", price: "CHANCE", icon: "❓" },
        { id: 16, zh: "人工濕地", en: "Wetland", type: "prop", price: 100, role: "NGO", icon: "💧" },
        { id: 17, zh: "多用途室", en: "Hall", type: "prop", price: 100, role: "PUB", icon: "🏫" },
        
        { id: 18, zh: "自由選擇", en: "FREEDOM", type: "teleport", price: "FREEDOM", icon: "✈️" },
        { id: 19, zh: "雨水空調", en: "Rain A/C", type: "prop", price: 100, role: "CIC", icon: "❄️" },
        { id: 20, zh: "石籠牆", en: "Gabion", type: "prop", price: 100, role: "NGO", icon: "🧱" },
        { id: 21, zh: "光電系統", en: "PV System", type: "prop", price: 100, role: "CIC", icon: "⚡" },
        { id: 22, zh: "室內展區 Lv.2", en: "Exhib. Lv.2", type: "prop", price: 100, role: "PUB", icon: "🖼️" },
        { id: 23, zh: "室內展區 Lv.1", en: "Exhib. Lv.1", type: "prop", price: 100, role: "PUB", icon: "🖼️" },
        { id: 24, zh: "機會卡", en: "CHANCE", type: "chance", price: "CHANCE", icon: "❓" },
        { id: 25, zh: "人工濕地", en: "Wetland", type: "prop", price: 100, role: "NGO", icon: "💧" },
        { id: 26, zh: "生態問答", en: "QUIZ", type: "quiz", price: "QUIZ", icon: "📖" },
        
        { id: 27, zh: "惡劣天氣", en: "PAUSE", type: "pause", price: "PAUSE", icon: "⛈️" },
        { id: 28, zh: "廣場 Lv.2", en: "Plaza Lv.2", type: "prop", price: 100, role: "PUB", icon: "🎪" },
        { id: 29, zh: "廣場 Lv.1", en: "Plaza Lv.1", type: "prop", price: 100, role: "PUB", icon: "🎪" },
        { id: 30, zh: "光電系統", en: "PV System", type: "prop", price: 100, role: "CIC", icon: "⚡" },
        { id: 31, zh: "原生林 Lv.2", en: "Forest Lv.2", type: "prop", price: 100, role: "NGO", icon: "🌲" },
        { id: 32, zh: "原生林 Lv.1", en: "Forest Lv.1", type: "prop", price: 100, role: "NGO", icon: "🌲" },
        { id: 33, zh: "機會卡", en: "CHANCE", type: "chance", price: "CHANCE", icon: "❓" },
        { id: 34, zh: "組裝合成", en: "MiC", type: "prop", price: 100, role: "CIC", icon: "🏗️" },
        { id: 35, zh: "竹亭蒸汽", en: "Bamboo Pav.", type: "prop", price: 100, role: "PUB", icon: "⛺" }
    ];

    // ================= 游戏核心状态 =================
    const players = [
        { id: 'CIC', color: '#ff6a00', money: 500, tokens: [0, 0] },
        { id: 'NGO', color: '#00c853', money: 500, tokens: [0, 0] },
        { id: 'PUB', color: '#2962ff', money: 500, tokens: [0, 0] }
    ];
    let currentPlayerIndex = 0;
    let properties = {}; 
    let isChanceActive = false;
    let pendingDiceResult = 0;
    const TOTAL_TILES = 36; // 缩减为 36

    // ================= 初始化与渲染 =================
    window.onload = () => {
        renderBoard();
        renderPlayers();
        updateLog(getT('logStart'));
        updateCenterUI();
    };

    function getT(key) {
        const langData = i18n[currentLang];
        return key.split('.').reduce((o, i) => o[i], langData);
    }

    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        document.getElementById('center-subtitle').innerText = getT('title');
        document.getElementById('lb-title').innerText = getT('lbTitle');
        renderBoard();
        renderPlayers();
        updateCenterUI();
        updateLeaderboard();
    }

    // 10x10 网格分配算法
    function getGridArea(i) {
        if (i === 0) return '10 / 10';
        if (i > 0 && i < 9) return `10 / ${10 - i}`;
        if (i === 9) return '10 / 1';
        if (i > 9 && i < 18) return `${10 - (i - 9)} / 1`;
        if (i === 18) return '1 / 1';
        if (i > 18 && i < 27) return `1 / ${i - 18 + 1}`;
        if (i === 27) return '1 / 10';
        if (i > 27 && i < 36) return `${i - 27 + 1} / 10`;
    }

    function renderBoard() {
        const wrapper = document.getElementById('board-wrapper');
        document.querySelectorAll('.tile').forEach(e => e.remove());

        tilesData.forEach((tData, i) => {
            const tileDiv = document.createElement('div');
            tileDiv.className = 'tile';
            tileDiv.id = `tile-${i}`;
            if([0, 9, 18, 27].includes(i)) tileDiv.classList.add('corner');
            tileDiv.style.gridArea = getGridArea(i);
            
            // 无阴影纯色高对比度文字
            let titleHTML = tData[currentLang];
            let borderStyle = "";
            if (tData.type === 'prop') {
                const roleColor = players.find(p=>p.id===tData.role).color;
                titleHTML = `<span style="color:${roleColor}; font-weight:bold;">[${tData.role}]</span><br>${titleHTML}`;
                if (properties[i]) {
                    const ownerColor = players.find(p=>p.id===properties[i]).color;
                    borderStyle = `border-bottom: 4px solid ${ownerColor};`;
                }
            }

            tileDiv.style = borderStyle;
            tileDiv.innerHTML = `
                <div class="tokens-container" id="t-container-${i}"></div>
                <div class="emoji-icon">${tData.icon}</div>
                <div class="tile-name">${titleHTML}</div>
                <div class="tile-price">${tData.type === 'prop' ? '$' + tData.price : tData.price}</div>
            `;
            wrapper.appendChild(tileDiv);
        });

        updateTokensUI();
    }

    function renderPlayers() {
        const container = document.getElementById('players-container');
        container.innerHTML = '';
        players.forEach(p => {
            const roleData = getT(`roles.${p.id}`);
            container.innerHTML += `
                <div class="player-card" style="border-left: 6px solid ${p.color}; opacity: ${p.id === players[currentPlayerIndex].id ? '1' : '0.5'}">
                    <div class="player-info">
                        <span class="p-name" style="color: ${p.color}">${roleData.name}</span>
                        <span class="p-target">${roleData.target}</span>
                    </div>
                    <div class="p-money">$${p.money}</div>
                </div>
            `;
        });
    }

    function updateTokensUI() {
        document.querySelectorAll('.tokens-container').forEach(c => c.innerHTML = '');
        players.forEach(p => {
            p.tokens.forEach((pos, i) => {
                const c = document.getElementById(`t-container-${pos}`);
                if (c) {
                    c.innerHTML += `<div class="token" style="background:${p.color}">${i+1}</div>`;
                }
            });
        });
    }

    function updateLog(msg) {
        const log = document.getElementById('sys-log');
        log.innerHTML += `<div class="log-entry">${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function updateCenterUI() {
        const p = players[currentPlayerIndex];
        const btn = document.getElementById('roll-btn-text');
        btn.innerHTML = `[${p.id}] ${getT('roll')}`;
        btn.style.backgroundColor = p.color;
    }

    function updateLeaderboard() {
        const stats = { CIC: 0, NGO: 0, PUB: 0 };
        const badgesHtml = [];
        
        Object.keys(properties).forEach(tileId => {
            const owner = properties[tileId];
            stats[owner]++;
            const tData = tilesData[tileId];
            const pColor = players.find(p=>p.id===owner).color;
            badgesHtml.push(`<span class="badge" style="border-color:${pColor}">${tData[currentLang]}</span>`);
        });

        document.getElementById('lb-stats').innerHTML = 
            `<span style="color:#ff6a00">[CIC] ${stats.CIC}</span>
             <span style="color:#00c853">[NGO] ${stats.NGO}</span>
             <span style="color:#2962ff">[PUB] ${stats.PUB}</span>`;
             
        document.getElementById('lb-badges').innerHTML = badgesHtml.join('');
    }

    // ================= 游戏交互逻辑 =================
    function rollDice() {
        if(isChanceActive) return;
        pendingDiceResult = Math.floor(Math.random() * 6) + 1;
        showTokenChoiceModal(pendingDiceResult);
    }

    function showTokenChoiceModal(steps) {
        const p = players[currentPlayerIndex];
        let html = `
            <h3>${getT('modal.actionTitle')}</h3>
            <p>${getT('modal.rolled')} <span style="font-family:var(--font-pixel); font-size:32px; color:${p.color};">${steps}</span> ${getT('modal.pts')}</p>
            <p style="margin:10px 0;">${getT('modal.selectToken')}</p>
        `;
        
        p.tokens.forEach((currentPos, i) => {
            const nextPos = (currentPos + steps) % TOTAL_TILES; // 36格系统
            const currentTile = tilesData[currentPos];
            const nextTile = tilesData[nextPos];
            
            let nextNameHTML = nextTile[currentLang];
            if(nextTile.type === 'prop') {
                const rColor = players.find(pl=>pl.id===nextTile.role).color;
                nextNameHTML = `<span style="color:${rColor}">[${nextTile.role}] ${nextNameHTML}</span>`;
            }

            html += `
                <button class="modal-btn token-choice-btn" onclick="executeMove(${i})">
                    ${getT('modal.moveToken')} [${i+1}]
                    <div style="font-size:14px; margin-top:5px;">
                        ${getT('modal.currentPos')} ${currentTile[currentLang]}<br>
                        <span class="expected-dest">➔ ${getT('modal.expectedPos')} ${nextNameHTML}</span>
                    </div>
                </button>
            `;
        });
        
        showGenericModal("", html, null, true);
    }

    function executeMove(tokenIndex) {
        closeGenericModal();
        const p = players[currentPlayerIndex];
        const oldPos = p.tokens[tokenIndex];
        p.tokens[tokenIndex] = (oldPos + pendingDiceResult) % TOTAL_TILES;
        
        if (p.tokens[tokenIndex] < oldPos && oldPos !== 0) {
            p.money += 200; 
            updateLog(`> [${p.id}] 經過起點，獲得 $200`);
        }
        
        renderBoard();
        handleTileEffect(p, tokenIndex);
    }

    function nextTurn() {
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        renderPlayers();
        updateCenterUI();
    }

    function showGenericModal(title, desc, extraHtml = null, hideBtn = false) {
        document.getElementById('gm-title').innerText = title;
        document.getElementById('gm-desc').innerHTML = desc;
        document.getElementById('gm-extra').innerHTML = extraHtml || "";
        document.getElementById('gm-btn').style.display = hideBtn ? 'none' : 'block';
        document.getElementById('generic-modal').style.display = 'flex';
    }
    function closeGenericModal() { document.getElementById('generic-modal').style.display = 'none'; }

    // ================= 踩格事件分发 =================
    function handleTileEffect(player, tokenIndex) {
        const tile = tilesData[player.tokens[tokenIndex]];
        updateLog(`> [${player.id}] 移動棋子[${tokenIndex+1}] 至 [${tile[currentLang]}].`);

        if (tile.type === 'prop') {
            const owner = properties[tile.id];
            if (!owner) {
                const roleColor = players.find(p=>p.id===tile.role).color;
                let html = `
                    <button class="modal-btn" style="background:#2196F3" onclick="buyProperty(${tile.id})">${getT('modal.btnBuy')} ($${tile.price})</button>
                    <button class="modal-btn" style="background:#999" onclick="closeGenericModal(); nextTurn();">${getT('modal.btnSkip')}</button>
                `;
                showGenericModal(getT('modal.buyTitle'), `<span style="color:${roleColor}; font-weight:bold;">[${tile.role}]</span> ${tile[currentLang]}<br><br>${getT('modal.buyDesc')}`, html, true);
            } else if (owner !== player.id) {
                const rent = tile.price * 0.5;
                player.money -= rent;
                players.find(p => p.id === owner).money += rent;
                updateLog(`> [${player.id}] 支付參觀費 $${rent} 給 [${owner}]`);
                renderPlayers();
                showGenericModal(getT('modal.rentTitle'), `支付 $${rent} 給 ${owner}`);
                nextTurn();
            } else {
                nextTurn(); 
            }
        } 
        else if (tile.type === 'chance') {
            updateLog(`> [${player.id}] 觸發機會，請點擊中央卡牌！`);
            isChanceActive = true;
            document.querySelectorAll('.chance-card').forEach(c => c.classList.add('active'));
        }
        else if (tile.type === 'quiz') {
            handleQuiz(player);
        }
        else if (tile.type === 'teleport') {
            let opts = tilesData.map(t => {
                let prefix = "";
                let suffix = "";
                if(t.type === 'prop'){
                    prefix = `[${t.role}] `;
                    suffix = properties[t.id] ? ` - (${getT('status.builtBy').replace('{role}', properties[t.id])})` : ` - (${getT('status.available')})`;
                } else if(t.type === 'start' || t.type === 'teleport') {
                    prefix = `[★] `;
                }
                return `<option value="${t.id}">${t.id}: ${prefix}${t[currentLang]}${suffix}</option>`;
            }).join('');
            
            let html = `
                <select id="teleport-sel" style="width:100%; padding:10px; margin:10px 0; font-size:16px;">${opts}</select>
                <button class="modal-btn" style="background:#ff6a00;" onclick="executeTeleport(${tokenIndex})">${getT('modal.btnTeleport') || '傳送'}</button>
            `;
            showGenericModal(getT('modal.freeTitle'), getT('modal.freeDesc'), html, true);
        }
        else {
            nextTurn();
        }
    }

    function buyProperty(tileId) {
        const player = players[currentPlayerIndex];
        const tile = tilesData[tileId];
        if (player.money >= tile.price) {
            player.money -= tile.price;
            properties[tileId] = player.id;
            updateLog(`> [${player.id}] 投資建設了 ${tile[currentLang]}`);
            renderPlayers();
            renderBoard();
            updateLeaderboard();
        } else {
            updateLog(`> [${player.id}] 資金不足。`);
        }
        closeGenericModal();
        nextTurn();
    }

    // ================= 机会卡系统 =================
    function drawChanceCard(element) {
        if(!isChanceActive) return;
        isChanceActive = false;
        document.querySelectorAll('.chance-card').forEach(c => c.classList.remove('active'));
        
        const player = players[currentPlayerIndex];
        const events = [
            { desc: "獲得綠色基金贊助，+$150", amt: 150 },
            { desc: "舉辦生態講座，門票收入 +$100", amt: 100 },
            { desc: "維護設施，支付 -$50", amt: -50 },
            { desc: "遭遇惡劣天氣，修繕花費 -$100", amt: -100 }
        ];
        const ev = events[Math.floor(Math.random() * events.length)];
        
        player.money += ev.amt;
        updateLog(`> 機會卡: ${ev.desc}`);
        renderPlayers();
        showGenericModal(getT('modal.chanceTitle'), ev.desc);
        nextTurn();
    }

    // ================= 测验系统 =================
    function handleQuiz(player) {
        const qIndex = Math.floor(Math.random() * quizDB.length);
        const qData = quizDB[qIndex][currentLang];
        
        let html = `<div style="display:flex; flex-direction:column; gap:8px;">`;
        qData.opts.forEach((opt, idx) => {
            html += `<button class="modal-btn quiz-opt" onclick="evalQuiz(${idx}, ${qIndex})">${String.fromCharCode(65+idx)}. ${opt}</button>`;
        });
        html += `</div><div id="quiz-feedback" class="quiz-feedback"></div>`;
        
        showGenericModal(getT('modal.quizTitle'), `<div style="text-align:left; margin-bottom:15px; font-weight:bold;">Q: ${qData.q}</div>`, html, true);
    }

    function evalQuiz(selectedIdx, qIndex) {
        const player = players[currentPlayerIndex];
        const isCorrect = selectedIdx === quizDB[qIndex][currentLang].ans;
        const correctText = quizDB[qIndex][currentLang].opts[quizDB[qIndex][currentLang].ans];
        
        if(isCorrect) {
            player.money += 200;
            updateLog(`> [${player.id}] 答對生態題，獲得 $200`);
        } else {
            player.money -= 50;
            updateLog(`> [${player.id}] 答錯了，扣除 $50`);
        }
        renderPlayers();
        
        document.querySelectorAll('.quiz-opt').forEach(b => b.style.display = 'none');
        const feedback = document.getElementById('quiz-feedback');
        feedback.style.display = 'block';
        feedback.style.borderColor = isCorrect ? '#3c763d' : '#a94442';
        feedback.style.color = isCorrect ? '#3c763d' : '#a94442';
        feedback.style.background = isCorrect ? '#dff0d8' : '#f2dede';
        feedback.innerHTML = `
            <div style="font-size:20px; margin-bottom:10px;">${isCorrect ? '✅ 答對了！' : '❌ 答錯了！'}</div>
            <div style="font-size:14px; color:#333;">正確答案: <br><b>${correctText}</b></div>
        `;
        
        document.getElementById('gm-btn').style.display = 'block';
        document.getElementById('gm-btn').onclick = () => {
            closeGenericModal();
            nextTurn();
        };
    }

    function executeTeleport(tokenIndex) {
        const target = parseInt(document.getElementById('teleport-sel').value);
        closeGenericModal();
        const p = players[currentPlayerIndex];
        p.tokens[tokenIndex] = target;
        renderBoard();
        handleTileEffect(p, tokenIndex);
    }

</script>
